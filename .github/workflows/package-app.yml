# Builds the standalone desktop installer.
#
# jpackage cannot cross-compile: an installer for a platform has to be produced on that platform.
# The matrix therefore has one entry per OS. Only macOS is built and supported today - adding Windows
# and Linux is a matter of appending entries here and actually testing the result, not a code change,
# since the OS-specific branches are already written.
name: Package app

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - 'app-v*'
      - 'app-beta-v*'

jobs:
  package:
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            task: packageDmg
            artifact: dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # A full JDK, not a JetBrains Runtime: jpackage ships only with the former.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build app package
        env:
          ORG_GRADLE_PROJECT_sentryAppDsn: ${{ secrets.SENTRY_APP_DSN }}
        run: ./gradlew :app:${{ matrix.task }}

      - name: Prepare macOS release asset
        if: matrix.task == 'packageDmg' && (startsWith(github.ref, 'refs/tags/app-v') || startsWith(github.ref, 'refs/tags/app-beta-v'))
        shell: bash
        run: |
          APP_VERSION="$(awk -F '=' '/^pluginVersion/ { gsub(/[[:space:]]/, "", $2); print $2 }' gradle.properties)"
          PACKAGE_VERSION="$(awk -F '=' '/^appPackageVersion/ { gsub(/[[:space:]]/, "", $2); print $2 }' gradle.properties)"
          PACKAGE_VERSION="${PACKAGE_VERSION:-$APP_VERSION}"

          if [[ "$GITHUB_REF_NAME" == app-beta-v* ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#app-beta-v}"
            APP_CHANNEL="beta"
            APP_RELEASE_NAME="Golden Diff Desktop ${APP_VERSION} (beta)"
          else
            TAG_VERSION="${GITHUB_REF_NAME#app-v}"
            APP_CHANNEL="stable"
            APP_RELEASE_NAME="Golden Diff Desktop ${APP_VERSION}"
          fi

          if [[ "$TAG_VERSION" != "$APP_VERSION" ]]; then
            echo "Tag version $TAG_VERSION does not match pluginVersion $APP_VERSION" >&2
            exit 1
          fi

          SOURCE_DMG="app/build/compose/binaries/main/dmg/Golden Diff-${PACKAGE_VERSION}.dmg"
          ASSET_DMG="Golden-Diff-${APP_VERSION}.dmg"
          cp "$SOURCE_DMG" "$ASSET_DMG"

          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          echo "APP_CHANNEL=$APP_CHANNEL" >> "$GITHUB_ENV"
          echo "APP_RELEASE_NAME=$APP_RELEASE_NAME" >> "$GITHUB_ENV"
          echo "APP_DMG=$ASSET_DMG" >> "$GITHUB_ENV"
          echo "APP_DMG_SHA256=$(shasum -a 256 "$ASSET_DMG" | awk '{ print $1 }')" >> "$GITHUB_ENV"

      - name: Create Sentry release
        if: env.SENTRY_AUTH_TOKEN != '' && matrix.task == 'packageDmg' && (startsWith(github.ref, 'refs/tags/app-v') || startsWith(github.ref, 'refs/tags/app-beta-v'))
        uses: getsentry/action-release@v3
        env:
          SENTRY_ORG: damian-kwasniak-consulting
          SENTRY_PROJECT: golden-diff-app
        with:
          environment: ${{ env.APP_CHANNEL }}
          release: golden-diff-app@${{ env.APP_VERSION }}
          set_commits: auto

      - name: Publish macOS app release
        if: matrix.task == 'packageDmg' && (startsWith(github.ref, 'refs/tags/app-v') || startsWith(github.ref, 'refs/tags/app-beta-v'))
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.APP_RELEASE_NAME }}
          files: ${{ env.APP_DMG }}
          generate_release_notes: true
          make_latest: false
          prerelease: ${{ env.APP_CHANNEL == 'beta' }}

      - name: Update Homebrew Cask
        if: matrix.task == 'packageDmg' && (startsWith(github.ref, 'refs/tags/app-v') || startsWith(github.ref, 'refs/tags/app-beta-v'))
        shell: bash
        run: |
          ./distribution/update-homebrew-cask.sh "$APP_VERSION" "$APP_DMG_SHA256" "$APP_CHANNEL"

          if [[ "$APP_CHANNEL" == "beta" ]]; then
            CASK_FILE="Casks/golden-diff@beta.rb"
          else
            CASK_FILE="Casks/golden-diff.rb"
          fi

          UPDATED_CASK="$RUNNER_TEMP/$(basename "$CASK_FILE")"
          cp "$CASK_FILE" "$UPDATED_CASK"
          git restore "$CASK_FILE"

          git fetch origin main
          git checkout main
          mkdir -p Casks
          cp "$UPDATED_CASK" "$CASK_FILE"

          if [[ -z "$(git status --porcelain -- "$CASK_FILE")" ]]; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$CASK_FILE"
          git commit -m "Update Homebrew ${APP_CHANNEL} Cask to ${APP_VERSION}"
          git push origin main

      - uses: actions/upload-artifact@v4
        with:
          name: golden-diff-${{ matrix.os }}
          path: app/build/compose/binaries/main/${{ matrix.artifact }}/*

  # Kept green on Linux from day one. It is the cheapest possible signal that core has not absorbed
  # assumptions about macOS's case-insensitive filesystem or path handling, long before anyone builds
  # the app there.
  core-tests-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :core:test
