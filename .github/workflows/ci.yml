name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build plugin
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin and run tests
        run: ./gradlew test buildPlugin -PgoldenDiffVariant=public --stacktrace

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: golden-diff-plugin
          path: build/distributions/golden-diff-[0-9]*.zip
          if-no-files-found: error
