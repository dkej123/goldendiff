name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build GitHub release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        run: ./gradlew buildPlugin -PgoldenDiffVariant=public --stacktrace

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: build/distributions/golden-diff-[0-9]*.zip
          generate_release_notes: true
